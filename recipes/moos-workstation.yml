name: moos-workstation
description: Opiniated Silverblue
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44
modules:
  - type: files
    files:
      - source: system/etc/
        destination: /etc/
  - type: dnf
    repos:
      files: 
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
        - https://negativo17.org/repos/fedora-steam.repo
      copr:
        enable:
          - atim/starship
          - lizardbyte/beta
    install:
      packages:
        - https://download.parallels.com/ras/v21/21.2.0.27178/RASClient-21.2.27178_x86_64.rpm
        - brave-browser
        - Sunshine
        - fastfetch
        - zsh
        - zsh-autosuggestions
        - zsh-syntax-highlighting
        - steam
        - steam-devices
        - starship
        - steam-devices
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - nvtop
        - htop
    group-install:
      packages:
        - virtualization
  - type: bling
    install:
      - 1password
  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        repo:
          title: Flathub (system)
  - type: signing
