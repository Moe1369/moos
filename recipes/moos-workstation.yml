name: moos-workstation
description: Opiniated Silverblue
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44
modules:
  - type: files
    files:
      - source: system/etc/
        destination: /etc/
  - type: dnf
    repos:
      files: 
        - https://negativo17.org/repos/fedora-steam.repo
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
      copr:
        enable:
          - atim/starship
          - lizardbyte/beta
    install:
      packages:
        - epiphany
        - brave-browser
        - Sunshine
        - fastfetch
        - zsh
        - zsh-autosuggestions
        - zsh-syntax-highlighting
        - steam
        - steam-devices
        - starship
        - steam-devices
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - nvtop
        - htop
        - gnome-software
    group-install:
      packages:
        - virtualization
  - type: bling
    install:
      - 1password
  - type: akmods
    base: main
    install:
      - xone
  - type: systemd
    user:
      enabled:
        - app-dev.lizardbyte.app.Sunshine.service
  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        repo:
          title: Flathub (system)
  - type: signing
  - type: gnome-extensions
    install:
      - 4998
      - 10070
      - 615
      - 517
      - 307
      - 9334
      - 2236
      - 7048
      - 352
