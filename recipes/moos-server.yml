name: moos-server
description: Opiniated Server Image
base-image: ghcr.io/ublue-os/fedora-coreos
image-version: stable-zfs
modules:
  - type: dnf
    repos:
      files: 
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
      copr:
        enable:
          - atim/starship
    install:
      packages:
        - wget
        - fastfetch
        - brave-browser
        - zsh
        - zsh-autosuggestions
        - zsh-syntax-highlighting
        - starship
        - htop
        - borgbackup
        - borgmatic
    remove:
      packages:
        - zincati
  - type: signing
  - type: kargs
    kargs:
       - i915.enable_guc=3
